<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBW35 Team Holidays 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f0e8;--surface:#fff;--border:#d6cfc0;--text:#2a2118;--muted:#7a6e5f;
  --today:#c0392b;--pending:#e67e22;--pending-bg:rgba(230,126,34,0.13);--weekend:#ede8df;
  --ok:#27ae60;--ok-bg:rgba(39,174,96,0.1);--warn-bg:#fcd4d0;--warn:#c0392b;
  --elephants:#e8956d;--bears:#7fb3d3;--flamingos:#d4a5c9;--penguins:#7ec8c8;
  --giraffes:#89c4a0;--pandas:#c9b97a;--zebras:#b0a0d4;--monkeys:#e8c96d;--extra:#a0a0a0;--kdv:#e91e8c;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);padding:1.5rem;}
h1{font-family:'Playfair Display',serif;font-size:1.8rem;letter-spacing:-.02em;margin-bottom:.15rem;}
.subtitle{font-size:.68rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.2rem;}
.controls{display:flex;gap:.6rem;margin-bottom:1.2rem;align-items:center;flex-wrap:wrap;}
.btn{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;padding:6px 13px;border:1px solid var(--text);background:var(--text);color:#fff;cursor:pointer;border-radius:3px;}
.btn.ghost{background:transparent;color:var(--text);}
.btn.green{background:var(--ok);border-color:var(--ok);}
.btn.lock{background:transparent;color:var(--muted);border-color:var(--border);font-size:.6rem;}
.vtoggle{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.vbtn{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;padding:5px 12px;border:none;border-right:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);}
.vbtn:last-child{border-right:none;}
.vbtn.active{background:var(--text);color:#fff;}
.save-ok{font-size:.6rem;color:var(--ok);margin-left:.5rem;opacity:0;transition:opacity .3s;}
.save-ok.show{opacity:1;}
.legend{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.2rem;align-items:center;}
.li{display:flex;align-items:center;gap:.35rem;font-size:.62rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);}
.ls{width:16px;height:8px;border-radius:2px;flex-shrink:0;}
.month-section{margin-bottom:2rem;}
.month-title{font-family:'Playfair Display',serif;font-size:1.2rem;border-bottom:2px solid var(--text);padding-bottom:3px;margin-bottom:.6rem;display:flex;align-items:baseline;gap:.6rem;}
.yt{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.1em;}
.mgrid{border-collapse:collapse;width:100%;table-layout:fixed;}
.mgrid th{text-align:center;padding:3px 1px;font-weight:500;font-size:.55rem;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);}
.mgrid th.name-col{text-align:left;width:110px;}
.mgrid th.wkh{color:#c0b8a8;}
.mgrid th.kdv-hdr{border-bottom:2px solid var(--kdv);color:var(--kdv);}
.mgrid th.td-hdr{color:#fff;position:relative;}
.mgrid th.td-hdr::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:16px;height:16px;background:var(--today);border-radius:50%;z-index:-1;}
.mgrid td.pc{padding:2px 5px 2px 0;white-space:nowrap;font-size:.65rem;border-bottom:1px solid var(--border);vertical-align:middle;width:110px;}
.pl{display:flex;align-items:center;gap:4px;}
.gd{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.mgrid td.dc{text-align:center;padding:2px 0;border-bottom:1px solid var(--border);position:relative;height:22px;}
.mgrid td.dc.wk{background:var(--weekend);}
.mgrid td.dc.kdvcl{background:rgba(233,30,140,0.07);}
.df{position:absolute;inset:2px 0;}
.df.pend{background:var(--pending-bg)!important;border-top:1.5px dashed var(--pending);border-bottom:1.5px dashed var(--pending);}
.df.rs{border-radius:3px 0 0 3px;}.df.re{border-radius:0 3px 3px 0;}.df.solo{border-radius:3px;}
.td-line{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--today);z-index:5;pointer-events:none;}
.rm-btn{position:absolute;top:0;right:1px;background:none;border:none;cursor:pointer;font-size:.58rem;color:rgba(0,0,0,.3);line-height:1;padding:0;display:none;}
.mgrid tr:hover .rm-btn{display:block;}
.hcrow td{border-top:1.5px solid var(--border);padding:2px 1px;text-align:center;}
.hclbl{font-size:.56rem;color:var(--muted);text-align:right!important;padding-right:5px!important;white-space:nowrap;}
.hcb{display:inline-block;width:15px;height:15px;line-height:15px;border-radius:50%;font-size:.54rem;font-weight:500;text-align:center;}
.hc1{background:#d5f0dc;color:#1a7a3a;}.hc2{background:#fde8cc;color:#8a4a00;}.hc3{background:#fcd4d0;color:#8a1a0a;}
.loclbl{display:inline-flex;font-size:.56rem;text-transform:uppercase;letter-spacing:.16em;color:#fff;background:var(--text);padding:2px 8px;border-radius:2px;margin:.4rem 0 .3rem;}
.kdv-row td{border-top:1.5px solid var(--border);padding:2px 1px;text-align:center;}
.kdv-lbl{font-size:.56rem;color:var(--kdv);text-align:right!important;padding-right:5px!important;white-space:nowrap;}
.kdv-dot{display:inline-block;width:12px;height:12px;border-radius:2px;background:var(--kdv);font-size:.5rem;line-height:12px;color:#fff;text-align:center;}
.sch-row td{border-top:1px solid var(--border);padding:2px 1px;text-align:center;}
.sch-lbl{font-size:.54rem;color:#555;text-align:right!important;padding-right:5px!important;white-space:nowrap;}
.sch-bar{display:block;height:7px;border-radius:2px;margin:1px auto;width:80%;}
.sch-bar.rs{border-radius:3px 0 0 3px;}.sch-bar.re{border-radius:0 3px 3px 0;}.sch-bar.mid{border-radius:0;}.sch-bar.solo{border-radius:3px;}
.sum-table{width:100%;border-collapse:collapse;font-size:.68rem;}
.sum-table th{font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:5px 8px;text-align:left;border-bottom:1px solid var(--border);}
.sum-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
.pill{display:inline-flex;align-items:center;gap:3px;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:2px 6px;font-size:.6rem;margin:2px 2px 2px 0;white-space:nowrap;}
.pill.pp{border-color:var(--pending);color:#7a4400;background:var(--pending-bg);}
.pill-x{cursor:pointer;color:var(--muted);font-size:.8rem;line-height:1;padding:0 1px;border:none;background:none;}
.overlay{position:fixed;inset:0;background:rgba(42,33,24,.52);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border-radius:8px;padding:1.8rem;max-width:490px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.22);transform:translateY(12px);transition:transform .2s;max-height:90vh;overflow-y:auto;}
.overlay.open .modal{transform:translateY(0);}
.modal h2{font-family:'Playfair Display',serif;font-size:1.25rem;margin-bottom:1.2rem;}
.fr{margin-bottom:.9rem;}
.fr label{display:block;font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:4px;}
.fr select,.fr input[type=date],.fr input[type=password]{width:100%;font-family:'DM Mono',monospace;font-size:.72rem;padding:7px 9px;border:1px solid var(--border);border-radius:3px;background:var(--bg);color:var(--text);outline:none;}
.frg{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
.radio-row{display:flex;gap:1.2rem;margin-top:5px;flex-wrap:wrap;}
.ro{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:.72rem;user-select:none;}
.ro input{width:auto;accent-color:var(--text);}
.mfooter{display:flex;gap:.5rem;margin-top:1.3rem;justify-content:flex-end;}
.cbox{margin-top:.8rem;padding:.7rem .9rem;border-radius:4px;font-size:.64rem;line-height:1.8;white-space:pre-line;}
.cbox.idle{background:#f0ede8;color:var(--muted);border:1px solid var(--border);}
.cbox.good{background:var(--ok-bg);border:1px solid var(--ok);color:#1a5a2a;}
.cbox.bad{background:var(--warn-bg);border:1px solid var(--warn);color:#5a1000;}
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.06em;padding:9px 20px;border-radius:4px;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:3000;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.2);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.tok{background:#1e7a40;}
@media print{body{padding:1cm;background:#fff;}.controls,.overlay,#toast,.rm-btn,.pill-x{display:none!important;}.month-section{break-inside:avoid;}}
</style>
</head>
<body>

<div class="controls">
  <div class="vtoggle">
    <button class="vbtn active" onclick="setView('m',this)">Monthly Grid</button>
    <button class="vbtn" onclick="setView('s',this)">By Person</button>
  </div>
  <span id="mgr-controls"></span>
  <button class="btn ghost" onclick="window.print()">🖨 Print</button>
  <span class="save-ok" id="save-ok">✓ Saved</span>
</div>

<h1>RBW35 Team Holidays 2026</h1>
<div class="subtitle">Rijnsburgerweg 35 · 2026</div>

<div class="legend">

  <div class="li"><div class="ls" style="background:var(--penguins)"></div>Penguins</div>
  <div class="li"><div class="ls" style="background:var(--giraffes)"></div>Giraffes</div>
  <div class="li"><div class="ls" style="background:var(--pandas)"></div>Pandas</div>
  <div class="li"><div class="ls" style="background:var(--zebras)"></div>Zebras</div>
  <div class="li"><div class="ls" style="background:var(--monkeys)"></div>Monkeys</div>

</div>

<div id="mv"></div>
<div id="sv" style="display:none"></div>

<!-- ADD MODAL -->
<div class="overlay" id="add-ov" onclick="if(event.target.id==='add-ov')closeAdd()">
  <div class="modal">
    <h2>＋ Add Holiday</h2>
    <div class="fr"><label>Team Member</label>
      <select id="fp" onchange="liveCheck()"><option value="">— Select person —</option></select>
    </div>
    <div class="frg">
      <div class="fr"><label>Start Date</label>
        <input type="date" id="fs" min="2026-01-01" max="2027-12-31" onchange="if(!document.getElementById('fe').value)document.getElementById('fe').value=this.value;liveCheck();">
      </div>
      <div class="fr"><label>End Date</label>
        <input type="date" id="fe" min="2026-01-01" max="2027-12-31" onchange="liveCheck()">
      </div>
    </div>
    <div class="fr"><label>Status</label>
      <div class="radio-row">
        <label class="ro"><input type="radio" name="fst" value="confirmed" checked> ✓ Confirmed</label>
        <label class="ro"><input type="radio" name="fst" value="pending"> ⏳ Pending</label>
      </div>
    </div>
    <div id="cbox" class="cbox idle">Select a person and dates to see how this fits in.</div>
    <div class="mfooter">
      <button class="btn ghost" onclick="closeAdd()">Cancel</button>
      <button class="btn green" onclick="submitHol()">Add to calendar</button>
    </div>
  </div>
</div>

<!-- PIN MODAL -->
<div class="overlay" id="pin-ov" onclick="if(event.target.id==='pin-ov')closePinModal()">

      <input type="password" id="pin-in" maxlength="8" placeholder="••••" autocomplete="off"

    </div>
    <div id="pin-err" style="color:var(--warn);font-size:.65rem;text-align:center;height:16px;margin-top:-4px;margin-bottom:4px;"></div>

      <button class="btn ghost" onclick="closePinModal()">Cancel</button>

</div>

// ── STORAGE ───────────────────────────────────────────────────────────────────
function loadData(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw)locs=JSON.parse(raw);
  }catch(e){}
}
function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify(locs));
    const el=document.getElementById('save-ok');
    el.classList.add('show');
    clearTimeout(_saveT);
    _saveT=setTimeout(()=>el.classList.remove('show'),2000);
  }catch(e){}
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function sameD(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function dim(y,m){return new Date(y,m+1,0).getDate();}
function fmtD(s){const d=pd(s);return d.getDate()+' '+MS[d.getMonth()];}
function wd(s,e){let c=0,d=new Date(pd(s)),en=pd(e);while(d<=en){const w=d.getDay();if(w&&w!==6)c++;d.setDate(d.getDate()+1);}return c;}
function onHol(m,date){const t=date.getTime();return m.hols.find(h=>t>=pd(h.s).getTime()&&t<=pd(h.e).getTime())||null;}
function isKDV(date){const t=date.getTime();return KDV_CLOSED.find(b=>b.d.getTime()===t)||null;}
function allM(){const r=[];locs.forEach(l=>l.teams.forEach(t=>t.members.forEach(m=>r.push({m,t,l}))));return r;}
function findM(name){return allM().find(x=>x.m.name===name);}
function ovlp(s1,e1,s2,e2){return s1<=e2&&s2<=e1;}
function toast(msg,ok){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='show'+(ok?' tok':'');
  clearTimeout(_tt);_tt=setTimeout(()=>t.className='',2800);
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function openPin(){
  document.getElementById('pin-in').value='';
  document.getElementById('pin-err').textContent='';
  document.getElementById('pin-ov').classList.add('open');
  setTimeout(()=>document.getElementById('pin-in').focus(),120);
}
function closePinModal(){document.getElementById('pin-ov').classList.remove('open');}
function tryPin(){
  if(document.getElementById('pin-in').value===PIN){
    isManager=true;closePinModal();renderMgrCtrl();rebuild();toast('🔓 Manager mode unlocked',true);
  }else{
    document.getElementById('pin-err').textContent='Incorrect PIN — try again';
    document.getElementById('pin-in').value='';document.getElementById('pin-in').focus();
    setTimeout(()=>document.getElementById('pin-err').textContent='',2000);
  }
}
function lock(){isManager=false;renderMgrCtrl();rebuild();toast('🔒 Locked');}
function renderMgrCtrl(){
  const el=document.getElementById('mgr-controls');
  el.innerHTML=isManager
    ?'<button class="btn green" onclick="openAdd()">＋ Add Holiday</button> <button class="btn lock" onclick="lock()">🔓 Manager — click to lock</button>'
    :'<button class="btn ghost" onclick="openPin()">🔒 Manager Login</button>';
}

// ── ADD MODAL ─────────────────────────────────────────────────────────────────
function openAdd(){
  const sel=document.getElementById('fp');
  sel.innerHTML='<option value="">— Select person —</option>';
  locs.forEach(loc=>{
    const og=document.createElement('optgroup');og.label=loc.name;
    loc.teams.forEach(t=>t.members.forEach(m=>{
      const o=document.createElement('option');o.value=m.name;
      o.textContent=m.name+' ('+t.group+')';og.appendChild(o);
    }));sel.appendChild(og);
  });
  sel.value='';document.getElementById('fs').value='';document.getElementById('fe').value='';
  document.querySelector('input[name="fst"][value="confirmed"]').checked=true;
  const cb=document.getElementById('cbox');cb.className='cbox idle';
  cb.textContent='Select a person and dates to see how this fits in.';
  document.getElementById('add-ov').classList.add('open');
}
function closeAdd(){document.getElementById('add-ov').classList.remove('open');}

function liveCheck(){
  const person=document.getElementById('fp').value;
  const sv=document.getElementById('fs').value,ev=document.getElementById('fe').value;
  const cb=document.getElementById('cbox');
  if(!person||!sv||!ev){cb.className='cbox idle';cb.textContent='Select a person and dates to see how this fits in.';return;}
  if(pd(ev)<pd(sv)){cb.className='cbox bad';cb.textContent='⚠ End date must be on or after start date.';return;}
  const info=findM(person);
  const self=info.m.hols.find(h=>ovlp(sv,ev,h.s,h.e));
  if(self){cb.className='cbox bad';cb.textContent='⚠ '+person+' already has leave during '+fmtD(self.s)+'–'+fmtD(self.e)+'.';return;}
  const locMs=info.l.teams.flatMap(t=>t.members);
  const cf=locMs.filter(m=>m.name!==person).flatMap(m=>m.hols.filter(h=>ovlp(sv,ev,h.s,h.e)).map(h=>({name:m.name,s:h.s,e:h.e,p:h.p})));
  let peak=0,d=new Date(pd(sv)),en=pd(ev);
  while(d<=en){if(d.getDay()&&d.getDay()!==6){const n=locMs.filter(m=>m.name===person||!!onHol(m,d)).length;if(n>peak)peak=n;}d.setDate(d.getDate()+1);}
  const pct=peak/locMs.length,days=wd(sv,ev);
  let msg=days+' working day'+(days!==1?'s':'')+' · '+info.t.group;
  if(!cf.length&&pct<0.4){cb.className='cbox good';msg+='\n✓ Looks fine — at peak '+peak+'/'+locMs.length+' people away.';}
  else{cb.className='cbox bad';if(pct>=0.4)msg+='\n⚠ At peak '+peak+'/'+locMs.length+' ('+Math.round(pct*100)+'%) away.';if(cf.length)msg+='\nAlso away: '+cf.map(c=>c.name+' ('+fmtD(c.s)+'–'+fmtD(c.e)+(c.p?' ⏳':'')+')')  .join(', ')+'.';}
  cb.textContent=msg;
}
function submitHol(){
  const person=document.getElementById('fp').value;
  const sv=document.getElementById('fs').value,ev=document.getElementById('fe').value;
  const pend=document.querySelector('input[name="fst"]:checked').value==='pending';
  if(!person||!sv||!ev){alert('Please fill in all fields.');return;}
  if(pd(ev)<pd(sv)){alert('End date must be on or after start date.');return;}
  const info=findM(person);
  if(info.m.hols.find(h=>ovlp(sv,ev,h.s,h.e))){alert(person+' already has a holiday overlapping this period.');return;}
  info.m.hols.push({id:'u'+Date.now(),s:sv,e:ev,p:pend});
  info.m.hols.sort((a,b)=>a.s.localeCompare(b.s));
  saveData();closeAdd();rebuild();
  const label=sv===ev?fmtD(sv):fmtD(sv)+'–'+fmtD(ev);
  toast((pend?'⏳':'✓')+' Added '+person+': '+label,!pend);
}
function removeHol(name,id){
  const info=findM(name);if(!info)return;
  info.m.hols=info.m.hols.filter(h=>h.id!==id);
  saveData();rebuild();toast('Removed holiday');
}
function approveHol(name,id){
  const info=findM(name);if(!info)return;
  const h=info.m.hols.find(h=>h.id===id);if(!h)return;
  h.p=false;
  saveData();rebuild();toast('✓ Approved — '+name+': '+fmtD(h.s)+(h.s!==h.e?'–'+fmtD(h.e):''),true);
}

// ── VIEWS ─────────────────────────────────────────────────────────────────────
function setView(v,btn){
  document.getElementById('mv').style.display=v==='m'?'block':'none';
  document.getElementById('sv').style.display=v==='s'?'block':'none';
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

// ── BUILD MONTHLY ─────────────────────────────────────────────────────────────
function buildMonthly(){
  const con=document.getElementById('mv');con.innerHTML='';
  // Rolling: start from current month, span 2026 + 2027
  const startYear=TODAY.getFullYear()<2026?2026:TODAY.getFullYear();
  const startMo=startYear===TODAY.getFullYear()?TODAY.getMonth():0;
  const months=[];
  for(let y=startYear;y<=2027;y++){
    const s=(y===startYear)?Math.max(y===2026?1:0,startMo):0;
    for(let mo=s;mo<=11;mo++) months.push({y,mo});
  }
  let lastY=null;
  for(const {y,mo} of months){
    if(y!==lastY){
      if(lastY!==null){
        const div=document.createElement('div');
        div.style.cssText='font-family:Playfair Display,serif;font-size:1.5rem;letter-spacing:-.02em;border-top:3px solid var(--text);padding-top:.8rem;margin:2rem 0 1.5rem;color:var(--text);';
        div.textContent=y;con.appendChild(div);
      }
      lastY=y;
    }
    const total=dim(y,mo),sd=(y===TODAY.getFullYear()&&mo===TODAY.getMonth())?TODAY.getDate():(y===2026&&mo===1)?1:1;
    const sec=document.createElement('div');sec.className='month-section';
    const title=document.createElement('div');title.className='month-title';
    title.innerHTML=MF[mo]+' <span class="yt">'+y+'</span>';sec.appendChild(title);
    const tbl=document.createElement('table');tbl.className='mgrid';
    const thead=document.createElement('thead'),hr=document.createElement('tr');
    const th0=document.createElement('th');th0.className='name-col';hr.appendChild(th0);
    const days=[];
    for(let d=sd;d<=total;d++){
      const date=new Date(y,mo,d);days.push(date);
      const dow=date.getDay(),kdv=isKDV(date),isT=sameD(date,TODAY);
      const th=document.createElement('th');
      if(!dow||dow===6)th.classList.add('wkh');
      if(kdv)th.classList.add('kdv-hdr');
      if(isT)th.classList.add('td-hdr');
      th.innerHTML='<div style="font-size:.48rem;margin-bottom:1px">'+DN[dow]+'</div><div>'+d+'</div>'+(kdv?'<div style="font-size:.4rem;color:var(--kdv)">●</div>':'');
      hr.appendChild(th);
    }
    thead.appendChild(hr);tbl.appendChild(thead);
    const tbody=document.createElement('tbody');
    locs.forEach((loc,li)=>{
      const lr=document.createElement('tr');
      const ltd=document.createElement('td');ltd.colSpan=days.length+1;
      ltd.style.cssText='padding-top:'+(li?'10px':'4px')+';padding-bottom:2px;border-bottom:none;';
      ltd.innerHTML='<span class="loclbl">'+loc.name+'</span>';lr.appendChild(ltd);tbody.appendChild(lr);
      loc.teams.forEach(team=>{
        const gr=document.createElement('tr');
        const gtd=document.createElement('td');gtd.colSpan=days.length+1;
        gtd.style.cssText='font-size:.54rem;text-transform:uppercase;letter-spacing:.1em;padding:5px 0 2px;border-bottom:none;color:'+team.color+';';
        gtd.textContent=team.group;gr.appendChild(gtd);tbody.appendChild(gr);
        team.members.forEach(member=>{
          const row=document.createElement('tr');
          const ntd=document.createElement('td');ntd.className='pc';
          ntd.innerHTML='<div class="pl"><div class="gd" style="background:'+team.color+'"></div>'+member.name+'</div>';
          row.appendChild(ntd);
          days.forEach(date=>{
            const td=document.createElement('td');td.className='dc';
            const dow=date.getDay(),kdv=isKDV(date),isT=sameD(date,TODAY);
            if(!dow||dow===6)td.classList.add('wk');
            if(kdv){td.classList.add('kdvcl');td.title=kdv.name+' — KDV Closed';}
            const h=onHol(member,date);
            if(h){
              const f=document.createElement('div');f.className='df';
              if(h.p){f.classList.add('pend');}else{f.style.background=team.color;}
              const fc=new Date(y,mo,sd);
              const iS=sameD(date,pd(h.s))||(date.getTime()===fc.getTime()&&pd(h.s)<fc);
              const iE=sameD(date,pd(h.e))||date.getDate()===total;
              if(iS&&iE)f.classList.add('solo');else if(iS)f.classList.add('rs');else if(iE)f.classList.add('re');
              if(isManager&&iS){
                const rb=document.createElement('button');rb.className='rm-btn';rb.textContent='×';
                rb.onclick=(e)=>{e.stopPropagation();if(confirm('Remove '+member.name+': '+fmtD(h.s)+'–'+fmtD(h.e)+'?'))removeHol(member.name,h.id);};
                f.appendChild(rb);
              }
              td.appendChild(f);
            }
            if(isT){const l=document.createElement('div');l.className='td-line';td.appendChild(l);}
            row.appendChild(td);
          });
          tbody.appendChild(row);
        });
      });
      const hcr=document.createElement('tr');hcr.className='hcrow';
      const lbl=document.createElement('td');lbl.className='hclbl';lbl.textContent=loc.name+' away';hcr.appendChild(lbl);
      const ms=loc.teams.flatMap(t=>t.members),tot=ms.length;
      days.forEach(date=>{
        const td=document.createElement('td');
        if(!date.getDay()||date.getDay()===6){hcr.appendChild(td);return;}
        const n=ms.filter(m=>onHol(m,date)).length;
        if(n){const p=n/tot;td.innerHTML='<span class="hcb '+(p>=.5?'hc3':p>=.3?'hc2':'hc1')+'">'+n+'</span>';}
        hcr.appendChild(td);
      });
      tbody.appendChild(hcr);
    });
    SCHOOL_HOLS.forEach(sh=>{
      const ms=new Date(y,mo,1),me=new Date(y,mo,total);
      if(sh.e<ms||sh.s>me)return;
      const shr=document.createElement('tr');shr.className='sch-row';
      const shl=document.createElement('td');shl.className='sch-lbl';shl.textContent='📚 '+sh.schools;shr.appendChild(shl);
      days.forEach(date=>{
        const td=document.createElement('td'),t=date.getTime();
        if(t>=sh.s.getTime()&&t<=sh.e.getTime()&&date.getDay()&&date.getDay()!==6){
          const fc=new Date(y,mo,sd);
          const iS=sameD(date,sh.s)||(t===fc.getTime()&&sh.s<fc);
          const iE=sameD(date,sh.e)||date.getDate()===total;
          const cls=iS&&iE?'solo':iS?'rs':iE?'re':'mid';
          td.innerHTML='<span class="sch-bar '+cls+'" style="background:'+sh.color+'" title="'+sh.schools+'"></span>';
        }
        shr.appendChild(td);
      });
      tbody.appendChild(shr);
    });
    const kr=document.createElement('tr');kr.className='kdv-row';
    const kl=document.createElement('td');kl.className='kdv-lbl';kl.textContent='KDV closed';kr.appendChild(kl);
    days.forEach(date=>{
      const td=document.createElement('td'),kdv=isKDV(date);
      if(kdv)td.innerHTML='<span class="kdv-dot" title="'+kdv.name+'">✕</span>';
      kr.appendChild(td);
    });
    tbody.appendChild(kr);tbl.appendChild(tbody);sec.appendChild(tbl);con.appendChild(sec);
  }
}

// ── BUILD SUMMARY ─────────────────────────────────────────────────────────────
function buildSummary(){
  const con=document.getElementById('sv');con.innerHTML='';
  locs.forEach(loc=>{
    const div=document.createElement('div');div.style.marginBottom='2rem';
    const banner=document.createElement('div');banner.className='loclbl';banner.style.cssText='margin:1rem 0 .7rem;';banner.textContent=loc.name;div.appendChild(banner);
    const tbl=document.createElement('table');tbl.className='sum-table';
    tbl.innerHTML='<thead><tr><th style="min-width:100px">Name</th><th>Group</th><th>Holiday Periods</th><th style="text-align:right;min-width:80px">Work Days</th></tr></thead>';
    const tbody=document.createElement('tbody');
    loc.teams.forEach(team=>team.members.forEach(member=>{
      const row=document.createElement('tr');
      row.innerHTML='<td><div class="pl"><div class="gd" style="background:'+team.color+'"></div>'+member.name+'</div></td>'
        +'<td style="color:'+team.color+';font-size:.6rem;text-transform:uppercase;letter-spacing:.07em">'+team.group+'</td>';
      const htd=document.createElement('td');
      if(!member.hols.length){htd.innerHTML='<span style="color:var(--muted);font-size:.62rem">No holidays yet</span>';}
      else member.hols.forEach(h=>{
        const label=h.s===h.e?fmtD(h.s):fmtD(h.s)+' – '+fmtD(h.e);
        const pill=document.createElement('span');pill.className='pill'+(h.p?' pp':'');
        pill.appendChild(document.createTextNode(label+(h.p?' ⏳':'')));
        if(isManager){
          if(h.p){
            const ap=document.createElement('button');ap.className='pill-x';ap.style.color='var(--ok)';ap.title='Approve';ap.innerHTML='✓';
            ap.onclick=()=>{approveHol(member.name,h.id);};
            pill.appendChild(ap);
          }
          const x=document.createElement('button');x.className='pill-x';x.innerHTML='×';
          x.onclick=()=>{if(confirm('Remove '+member.name+': '+label+'?'))removeHol(member.name,h.id);};
          pill.appendChild(x);
        }
        htd.appendChild(pill);
      });
      row.appendChild(htd);
      const total=member.hols.reduce((s,h)=>s+wd(h.s,h.e),0);
      const dtd=document.createElement('td');dtd.style.textAlign='right';
      dtd.innerHTML=total?'<strong>'+total+'</strong> <span style="color:var(--muted);font-size:.58rem">days</span>':'<span style="color:var(--muted)">—</span>';
      row.appendChild(dtd);tbody.appendChild(row);
    }));
    tbl.appendChild(tbody);div.appendChild(tbl);con.appendChild(div);
  });
}

function rebuild(){buildMonthly();buildSummary();}

loadData();
renderMgrCtrl();
rebuild();
</script>
